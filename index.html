<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OctoFit Tracker - Fitness App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1f883d 0%, #187d2a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
        }
        
        .octo-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #1f883d;
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .tagline {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 300;
        }
        
        .features {
            text-align: left;
            margin: 30px 0;
            display: inline-block;
        }
        
        .features ul {
            list-style: none;
            margin: 20px 0;
        }
        
        .features li {
            padding: 10px 0;
            color: #555;
            font-size: 1.1rem;
        }
        
        .features li:before {
            content: "✅ ";
            color: #1f883d;
            font-weight: bold;
            margin-right: 10px;
        }
        
        .links {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background-color: #1f883d;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #187d2a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(31, 136, 61, 0.4);
        }
        
        .btn-secondary {
            background-color: #f0f0f0;
            color: #1f883d;
            border: 2px solid #1f883d;
        }
        
        .btn-secondary:hover {
            background-color: #1f883d;
            color: white;
            transform: translateY(-2px);
        }
        
        .footer {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="octo-emoji">🐙</div>
        <h1>Hello OctoFit</h1>
        <p class="tagline">Transform your fitness journey with Mergington High's tracking app</p>
        
        <div class="features">
            <ul>
                <li>Track your activities</li>
                <li>Compete with friends</li>
                <li>Earn achievements</li>
                <li>Personalized workouts</li>
            </ul>
        </div>
        
        <div class="links">
            <a href="http://localhost:3000" class="btn btn-primary">Open App</a>
            <a href="http://localhost:8000/api/" class="btn btn-secondary">API Docs</a>
        </div>
        
        <div class="footer">
            <p>🎓 Built for Mergington High School</p>
            <p>© 2025 OctoFit Tracker. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
